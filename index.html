<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fitness Cloud Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr) 60px;
            height: 100px;
        }
        /* 影片選單：側滑式設計，不干擾儀表 */
        #library-overlay {
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        #library-overlay.active { transform: translateX(0); }
    </style>
</head>
<body class="bg-black text-white h-screen overflow-hidden flex flex-col">

    <div class="relative flex-grow bg-slate-950 flex items-center justify-center">
        <video id="player" class="w-full h-full object-contain" playsinline>
            <source src="" type="video/mp4">
        </video>

        <div id="library-overlay" class="absolute inset-y-0 right-0 w-64 bg-slate-900/95 shadow-2xl p-4 z-40 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">雲端課程庫</h3>
                <button onclick="toggleLib()" class="text-slate-400">關閉</button>
            </div>
            <div id="cloud-playlist" class="space-y-4">
                <p class="text-xs text-slate-500">正在同步雲端清單...</p>
            </div>
        </div>
        
        <button onclick="toggleLib()" class="absolute top-4 right-4 bg-blue-600 p-2 rounded-full shadow-lg">
            選課
        </button>
    </div>

    <div class="dashboard-fixed bg-slate-900 border-t border-blue-500/30">
        <div class="dashboard-grid items-center text-center">
            <div class="flex flex-col">
                <span class="text-xs text-slate-500">TIME</span>
                <span id="v-time" class="text-xl font-mono text-blue-400">00:00</span>
            </div>
            <div class="flex flex-col">
                <span class="text-xs text-slate-500">RESIST</span>
                <span id="v-res" class="text-xl font-mono text-white">10</span>
            </div>
            <div class="flex flex-col">
                <span class="text-xs text-slate-500">KCAL</span>
                <span id="v-cal" class="text-xl font-mono text-orange-500">0</span>
            </div>
            <button onclick="requestFS()" class="flex items-center justify-center text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </button>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const overlay = document.getElementById('library-overlay');

        // 模擬從雲端獲取的 API 數據
        const mockCloudData = [
            { title: "法蘭克福林間小徑", url: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4", kcal: 300 },
            { title: "巴黎城市巡禮", url: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4", kcal: 450 }
        ];

        function renderCloudPlaylist() {
            const container = document.getElementById('cloud-playlist');
            container.innerHTML = mockCloudData.map(v => `
                <div onclick="playVideo('${v.url}')" class="bg-white/5 p-3 rounded-lg border border-white/10 hover:border-blue-500 transition cursor-pointer">
                    <div class="text-sm font-medium">${v.title}</div>
                    <div class="text-xs text-slate-500 mt-1">預估消耗: ${v.kcal} kcal</div>
                </div>
            `).join('');
        }

        function playVideo(url) {
            player.src = url;
            player.play();
            toggleLib();
        }

        function toggleLib() {
            overlay.classList.toggle('active');
        }

        function requestFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初始化
        renderCloudPlaylist();
        
        // 模擬數據更新
        let seconds = 0;
        setInterval(() => {
            if(!player.paused) {
                seconds++;
                document.getElementById('v-time').innerText = 
                    new Date(seconds * 1000).toISOString().substr(14, 5);
                document.getElementById('v-cal').innerText = Math.floor(seconds * 0.25);
            }
        }, 1000);
    </script>
</body>
</html>
